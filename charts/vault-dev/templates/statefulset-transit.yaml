{{- if .Values.transit.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vault.fullname" . }}-transit
  namespace: {{ .Release.Namespace }}

spec:
  serviceName: {{ include "vault.fullname" . }}-transit-headless

  replicas: {{ .Values.transit.replicaCount }}

  selector:
    matchLabels:
      app: {{ include "vault.fullname" . }}-transit


  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-transit.yaml") . | sha256sum }}
      labels:
        app: {{ include "vault.fullname" . }}-transit


    spec:
      serviceAccountName: {{ include "vault.fullname" . }}-vault-sa

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: auto-unseal
          image: alpine/k8s:1.29.2
          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting auto-unseal sidecar loop..."
              while true; do
                sleep 5
                if [ -f /vault/unseal/key ]; then
                  UNSEAL_KEY=$(cat /vault/unseal/key)
                  INIT_STATUS=$(curl -s "$VAULT_ADDR/v1/sys/init" 2>/dev/null | grep -o '"initialized":true' || true)
                  
                  if [ -n "$INIT_STATUS" ]; then
                    # Check health status, including 503 sealed code
                    SEAL_CHECK=$(curl -s "$VAULT_ADDR/v1/sys/health" 2>/dev/null || true)
                    SEALED=$(echo "$SEAL_CHECK" | grep -o '"sealed":true' || true)
                    
                    if [ -n "$SEALED" ]; then
                      echo "Transit Vault is sealed. Auto-unsealing..."
                      curl -sf -X PUT "$VAULT_ADDR/v1/sys/unseal" \
                        -H "Content-Type: application/json" \
                        -d "{\"key\":\"$UNSEAL_KEY\"}" >/dev/null || echo "Failed to unseal"
                    fi
                  fi
                fi
              done
          volumeMounts:
            - name: unseal-key
              mountPath: /vault/unseal
              readOnly: true

        - name: vault
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["vault", "server", "-config=/vault/config/vault.hcl"]
          ports:
            - name: http
              containerPort: 8200
            - name: internal
              containerPort: 8201

          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5

          volumeMounts:
            - name: config
              mountPath: /vault/config
            - name: data
              mountPath: /vault/data
            - name: unseal-key
              mountPath: /vault/unseal
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: {{ include "vault.fullname" . }}-transit-config
        - name: unseal-key
          secret:
            secretName: {{ include "vault.fullname" . }}-transit-token
            optional: true
            items:
              - key: key
                path: key


  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        {{- if (eq "-" .Values.persistence.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
{{- end }}
