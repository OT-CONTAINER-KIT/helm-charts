{{- if .Values.transit.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vault.fullname" . }}-transit
  namespace: {{ .Release.Namespace }}

spec:
  serviceName: {{ include "vault.fullname" . }}-transit-headless

  replicas: {{ .Values.transit.replicaCount }}

  selector:
    matchLabels:
      app: {{ include "vault.fullname" . }}-transit


  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-transit.yaml") . | sha256sum }}
      labels:
        app: {{ include "vault.fullname" . }}-transit


    spec:
      serviceAccountName: {{ include "vault.fullname" . }}-vault-sa

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: vault
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          command:
            - /bin/sh
            - -c
            - |
              # Start vault server in background
              vault server -config=/vault/config/vault.hcl &
              VAULT_PID=$!

              # Wait for Vault API to become reachable
              echo "Waiting for Vault to start..."
              until curl -sf http://127.0.0.1:8200/v1/sys/health?standbyok=true\&sealedcode=200\&uninitcode=200 > /dev/null 2>&1; do
                sleep 2
              done
              echo "Vault API is reachable."

              # Auto-unseal on restart: if initialized and sealed, unseal using K8s secret key
              INIT_STATUS=$(curl -s http://127.0.0.1:8200/v1/sys/init | grep -c '"initialized":true' || true)
              if [ "$INIT_STATUS" -ge 1 ]; then
                SEALED=$(curl -s http://127.0.0.1:8200/v1/sys/seal-status | grep -c '"sealed":true' || true)
                if [ "$SEALED" -ge 1 ] && [ -f /vault/unseal/key ]; then
                  UNSEAL_KEY=$(cat /vault/unseal/key)
                  echo "Transit Vault is sealed after restart. Auto-unsealing..."
                  curl -sf -X PUT http://127.0.0.1:8200/v1/sys/unseal \
                    -H "Content-Type: application/json" \
                    -d "{\"key\":\"$UNSEAL_KEY\"}"
                  echo "Transit Vault unsealed successfully."
                fi
              fi

              # Wait for vault process (keep container alive)
              wait $VAULT_PID

          ports:
            - name: http
              containerPort: 8200
            - name: internal
              containerPort: 8201

          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: 8200
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5

          volumeMounts:
            - name: config
              mountPath: /vault/config
            - name: data
              mountPath: /vault/data
            - name: unseal-key
              mountPath: /vault/unseal
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: {{ include "vault.fullname" . }}-transit-config
        - name: unseal-key
          secret:
            secretName: {{ include "vault.fullname" . }}-transit-token
            optional: true
            items:
              - key: key
                path: key


  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        {{- if (eq "-" .Values.persistence.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
{{- end }}
