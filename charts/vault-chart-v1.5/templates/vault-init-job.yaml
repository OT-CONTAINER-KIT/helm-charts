{{- if .Values.main.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vault.fullname" . }}-vault-init-job
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
spec:
  template:
    metadata:
      name: main-init
    spec:
      serviceAccountName: {{ include "vault.fullname" . }}-vault-sa
      restartPolicy: OnFailure

      containers:
        - name: vault-init
          image: alpine/k8s:1.29.2
          command:
            - /bin/sh
            - -c
            - |
              set -e

              TRANSIT_ADDR="http://{{ include "vault.fullname" . }}-transit:8200"
              MAIN_ADDR="http://{{ include "vault.fullname" . }}-main:8200"

              echo "Waiting for Transit Vault..."
              until curl -s "$TRANSIT_ADDR/v1/sys/health" > /dev/null; do
                echo "  ...waiting for transit vault"
                sleep 5
              done
              echo "Transit Vault is ready!"

              echo "Waiting for Main Vault API..."
              until curl -s "$MAIN_ADDR/v1/sys/health" > /dev/null; do
                echo "  ...waiting for main vault API"
                sleep 5
              done
              echo "Main Vault API is reachable!"

              echo "Waiting for main vault pod to be ready..."
              kubectl wait --for=condition=ready pod/{{ include "vault.fullname" . }}-main-0 -n {{ .Release.Namespace }} --timeout=180s

              # Check if already initialized
              MAIN_INIT_STATUS=$(curl -s "$MAIN_ADDR/v1/sys/init" | jq -r '.initialized')
              if [ "$MAIN_INIT_STATUS" = "true" ]; then
                echo "Main Vault is already initialized."
                exit 0
              fi

              echo "Initializing Main Vault..."
              INIT_OUTPUT=$(kubectl exec {{ include "vault.fullname" . }}-main-0 -n {{ .Release.Namespace }} -- \
                sh -c "export VAULT_ADDR=http://127.0.0.1:8200 && vault operator init")

              echo "$INIT_OUTPUT"

              # Extract root token
              ROOT_TOKEN=$(echo "$INIT_OUTPUT" | grep 'Initial Root Token:' | awk '{print $NF}')

              # Extract keys (unseal/recovery)
              KEYS=$(echo "$INIT_OUTPUT" | grep -E 'Unseal Key|Recovery Key' | awk '{print $NF}' | paste -sd "," -)

              if [ -n "$ROOT_TOKEN" ]; then
                echo "Saving tokens to Kubernetes secret..."
                kubectl create secret generic {{ include "vault.fullname" . }}-main-vault-keys \
                  --from-literal=root-token="$ROOT_TOKEN" \
                  --from-literal=keys="$KEYS" \
                  -n {{ .Release.Namespace }} \
                  --dry-run=client -o yaml | kubectl apply -f -

                echo "Keys successfully saved!"
              else
                echo "ERROR: Failed to extract root token!"
                exit 1
              fi

              echo "Main Vault initialization COMPLETE!"
{{- end }}
