apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vault.fullname" . }}-vault-sa
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vault.fullname" . }}-vault-role
rules:
  - apiGroups: [""]
    resources: ["secrets", "pods", "pods/exec"]
    verbs: ["get", "create", "patch", "delete", "update", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vault.fullname" . }}-vault-binding
subjects:
  - kind: ServiceAccount
    name: {{ include "vault.fullname" . }}-vault-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "vault.fullname" . }}-vault-role
  apiGroup: rbac.authorization.k8s.io
