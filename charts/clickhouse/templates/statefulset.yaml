apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clickhouse.fullname" . }}
  labels:
    {{- include "clickhouse.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "clickhouse.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "clickhouse.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "clickhouse.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: clickhouse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.appDb | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.appUser | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ .Values.clickhouse.appPassword | quote }}
            - name: CLICKHOUSE_DEFAULT_USER
              value: {{ .Values.clickhouse.defaultUser | quote }}
            - name: CLICKHOUSE_DEFAULT_PASSWORD
              value: {{ .Values.clickhouse.defaultPassword | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "clickhouse.fullname" . }}-data
