vm:
  enabled: true

  
  ## VM Operator ##

  victoria-metrics-operator:
    enabled: true

    image:
      registry: quay.io
      repository: opstree/victoriametrics/operator
      tag: "107f97f"

    resources:
      limits:
        cpu: 200m
        memory: 500Mi
      requests:
        cpu: 100m
        memory: 300Mi

    tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        operator: Exists

    serviceMonitor:
      enabled: true

    operator:
      disable_prometheus_converter: false

    env:
      # opstree hardened images — identified and pushed
      - name: VM_VMSINGLEDEFAULT_IMAGE
        value: "quay.io/opstree/victoriamertics-victoriametrics:v1.40.0"
      - name: VM_VMAGENTDEFAULT_IMAGE
        value: "quay.io/opstree/victoriametrics-vmagent:1"
      - name: VM_VMALERTDEFAULT_IMAGE
        value: "quay.io/opstree/victoriametrics-vmalert:1"
      - name: VM_VMALERTMANAGER_ALERTMANAGERDEFAULTBASEIMAGE
        value: "quay.io/opstree/alertmanager"
      # upstream images — not yet hardened
      - name: VM_VLOGSDEFAULT_IMAGE
        value: "quay.io/victoriametrics/victoria-logs"
      - name: VM_VMCLUSTERDEFAULT_VMSELECTDEFAULT_IMAGE
        value: "quay.io/victoriametrics/vmselect"
      - name: VM_VMCLUSTERDEFAULT_VMSTORAGEDEFAULT_IMAGE
        value: "quay.io/victoriametrics/vmstorage"
      - name: VM_VMCLUSTERDEFAULT_VMINSERTDEFAULT_IMAGE
        value: "quay.io/victoriametrics/vminsert"
      - name: VM_VMBACKUP_IMAGE
        value: "quay.io/victoriametrics/vmbackupmanager"
      - name: VM_VMAUTHDEFAULT_IMAGE
        value: "quay.io/victoriametrics/vmauth"

  ## Grafana — managed via standalone grafana chart

  grafana:
    enabled: false

  ## Alertmanager ##

  alertmanager:
    enabled: true
    spec:
      replicaCount: 1
      resources:
        limits:
          cpu: 250m
          memory: 500Mi
        requests:
          cpu: 100m
          memory: 500Mi
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists

  ## VMSingle ##
  
  vmsingle:
    enabled: true
    spec:
      retentionPeriod: "7d"
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: "1"
          memory: 1Gi
      storage:
        storageClassName: standard
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists

  ## VMAgent ##

  vmagent:
    enabled: true
    spec:
      scrapeInterval: 30s
      resources:
        limits:
          cpu: 500m
          memory: 500Mi
        requests:
          cpu: 100m
          memory: 500Mi
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists

  ## VMAlert ##
  
  vmalert:
    enabled: true
    spec:
      resources:
        limits:
          cpu: 500m
          memory: 500Mi
        requests:
          cpu: 100m
          memory: 500Mi
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists

  ## Kube State Metrics ##

  kube-state-metrics:
    image:
      registry: ""
      repository: quay.io/opstree/kube-state-metrics
      tag: "2"
      digest: ""
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        operator: Exists

  ## Node Exporter ##

  prometheus-node-exporter:
    image:
      registry: quay.io
      repository: opstree/node-exporter
      tag: "1-alpine3"
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
      requests:
        cpu: 10m
        memory: 32Mi
    tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        operator: Exists

  
  ## Disabled by default ##

  defaultDashboards:
    enabled: false

  defaultRules:
    create: false

  vmcluster:
    enabled: false

## Prometheus Operator CRDs — disabled, VM operator handles CRDs ##

prometheus-operator-crds:
  enabled: false