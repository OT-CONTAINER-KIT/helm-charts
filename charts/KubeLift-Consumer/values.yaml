name: kubelift-consumer
component: consumer

base:
  image:
    pullPolicy: "Always"
    repository: ""
    tag: latest
    pullSecrets: ""
  existingSecret: kubelift-consumer

replicaCount: 2

healthcheck:
  enabled: false
  statusPath: /health

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "300m"
    memory: "300Mi"
  limits:
    cpu: "300m"
    memory: "300Mi"

volumes:
  configMaps:
    - name: kubelift-consumer-config
      mountPath: /etc/kubelift/
      data:
        config.yaml: |
          {}

livenessProbe: {}
readinessProbe: {}

ingress:
  enabled: false

internalIngress:
  enabled: false

autoscaling:
  enabled: false
