# Global tag toggles. Set to false to disable a service by tag.
tags:
  backend: true
  frontend: true
  consumer: true
  mcp-server: true
  mcp-client: true

# Example toggle (true -> false):
# backend:
#   enabled: false
# tags:
#   backend: false

backend:
  enabled: true
  name: kubelift-api
  component: api

  base:
    image:
      pullPolicy: "Always"
      repository: ""
      tag: latest
      pullSecrets: ""
    existingSecret: kubelift-api

  replicaCount: 1

  healthcheck:
    enabled: false
    statusPath: /health

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  resources:
    requests:
      cpu: 500m
      memory: 500Mi
    limits:
      cpu: 1000m
      memory: 500Mi

  volumes:
    configMaps:
      - name: kubelift-api-config
        mountPath: /etc/kubelift/
        data:
          config.yaml: |
            {}

  livenessProbe: {}
  readinessProbe: {}

  ingress:
    enabled: false

  internalIngress:
    enabled: false

  autoscaling:
    enabled: false

