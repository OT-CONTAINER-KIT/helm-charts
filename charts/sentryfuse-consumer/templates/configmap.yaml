{{- if .Values.volumes }}
{{- if .Values.volumes.configMaps }}
{{ range $cm := .Values.volumes.configMaps}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cm.name }}
  labels:
    {{- include "sentryfuse.labels" $ | nindent 4 }}
  namespace: sentryfuse
data:
  {{- range $filename, $content := $cm.data }}
  {{ $filename }}: |-
{{ $content | toString | indent 4}}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
