apiVersion: v1
kind: Pod
metadata:
  name: {{ include "flagd.name" . }}-test-connection
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "flagd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - curl
        - -X
        - POST
        - http://{{ include "flagd.name" . }}.{{ .Values.namespace }}.svc.cluster.local:8016/ofrep/v1/evaluate/flags/my-feature
        - -H
        - "Content-Type: application/json"
        - -d
        - '{"context": {}}'
  restartPolicy: Never
