apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-env-js
  labels: 
    app.kubernetes.io/name: "runtime-env-js"
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
data:
  runtime-env.js: |-
    window.RUNTIME_CONFIG = {
      "PUBLIC_API": {{ .Values.envJson.publicapi | quote }},
      "BP_URL": {{ .Values.maturityDashboard.envJson.frontend | quote }},
      {{- if .Values.envJson.organisationName }}
      "ORGANISATION_NAME": "{{ .Values.envJson.organisationName }}",
      {{- end }}
      {{- if .Values.envJson.organisationLogoUrl }}
      "ORGANISATION_LOGO_URL": "{{ .Values.envJson.organisationLogoUrl }}",
      {{- end }}
      {{- if .Values.envJson.logoHeight }}
      "LOGO_HEIGHT": "{{ .Values.envJson.logoHeight }}",
      {{- end }}
      {{- if .Values.envJson.logoWidth }}
      "LOGO_WIDTH": "{{ .Values.envJson.logoWidth }}",
      {{- end }}
      {{- if .Values.envJson.isBeta }}
      "IS_BETA": "{{ .Values.envJson.isBeta }}",
      {{- end }}
      {{- if .Values.envJson.loginVia }}
      "LOGIN_VIA": "{{ .Values.envJson.loginVia }}",
      {{- end }}
      {{- if .Values.envJson.insightUrl }}
      "INSIGHT_URL": "{{ .Values.envJson.insightUrl }}",
      {{- end }}
      {{- if .Values.envJson.workspaceApi }}
      "WORKSPACE_API": "{{ .Values.envJson.workspaceApi }}",
      {{- end }}
      {{- if .Values.envJson.platform }}
      "PLATFORM": "{{ .Values.envJson.platform }}",
      {{- end }}
      {{- if .Values.envJson.awsMarketPlace }}
      "AWS_MARKET_PLACE": "{{ .Values.envJson.awsMarketPlace }}",
      {{- end }}
      "SIGNUP_PARTNER_LIST": [
        {
          "img_url": "/images/products/buildpiper_okta.png",
          "link": "https://github.com/login/oauth/authorize/?client_id=${client_id}&scope=user:email",
          "provider": "GitHub"
        },
        {
          "img_url": "/images/products/product_7.png",
          "link": "https://gitlab.com/oauth/authorize?response_type=code&redirect_uri=http://localhost:3000/auth/complete/gitlab&client_id=${client_id}&scope=read_user",
          "provider": "GitLab"
        },
        {
          "img_url": "/images/products/product_8.png",
          "link": "https://accounts.google.com/o/oauth2/v2/auth/oauthchooseaccount?response_type=code&scope=profile email&redirect_uri=http://localhost:3000/auth/complete/google&client_id=${client_id}",
          "provider": "Google"
        },
        {
          "img_url": "/images/products/product_6.png",
          "link": "https://bitbucket.org/site/oauth2/authorize?client_id=${client_id}&response_type=code",
          "provider": "BitBucket"
        }
      ]
    }
