apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{  .Values.scheduleapi.name }}
  labels: 
    app.kubernetes.io/name: {{ .Values.scheduleapi.name | default .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    {{- include "global.labels" .Values.scheduleapi | indent 4 }}
spec:
  {{- if not .Values.scheduleapi.hpa.enabled }}
  replicas: {{ .Values.scheduleapi.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "global.labels" .Values.scheduleapi | indent 6 }}
  template:
    metadata:
      labels:
        {{- include "global.labels" .Values.scheduleapi | indent 8 }}
    spec:
      {{- if ne .Values.commonServiceAccount "" }}
      serviceAccountName: {{ .Values.commonServiceAccount }}
      {{- end }}
      securityContext:
        runAsUser: {{ .Values.common.securityContext.runAsUser }}
        runAsGroup: {{ .Values.common.securityContext.runAsGroup }}
        fsGroup: {{ .Values.common.securityContext.fsGroup }}
        {{- if .Values.common.securityContext.fsGroupChangePolicy }}
        fsGroupChangePolicy: "{{- .Values.common.securityContext.fsGroupChangePolicy -}}"
        {{- end }}
        {{- if .Values.common.securityContext.supplementalGroups }}
        supplementalGroups:
          {{- range $supplementalGroup := .Values.common.securityContext.supplementalGroups }}
        - {{- $supplementalGroup -}}
          {{- end }}
        {{- end }}
      {{- include "workload.imagePullSecrets" .Values | nindent 6 }}
      containers:
        - args:
            - scheduledapi
          tty: true
          env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: HOME_PATH_OF_HOST
            value: {{ .Values.envJson.homeDirectoryForSteps }}
          image: "{{- .Values.imagePullSecrets.dockerConfig.registry -}}/{{- .Values.scheduleapi.image.name -}}:{{- .Values.scheduleapi.image.tag -}}"
          imagePullPolicy: {{ .Values.scheduleapi.imagePullPolicy }}
          name: {{  .Values.scheduleapi.name }}
          securityContext:
            allowPrivilegeEscalation: false
            # capabilities:
            #   drop:
            #   - ALL
          ports:
            {{- include "workload.ports" .Values.scheduleapi.service | indent 12 }}
          volumeMounts:
            {{- include "workload.volumeMounts" .Values.scheduleapi | indent 12 }}
          {{- include "workload.resources" .Values.scheduleapi | indent 10 }}
          {{- include "workload.startupProbe" .Values.scheduleapi | indent 10 }}
          {{- include "workload.livenessProbe" .Values.scheduleapi | indent 10 }}
          {{- include "workload.readinessProbe" .Values.scheduleapi | indent 10 }}
      {{- if .Values.scheduleapi.nodeSelector.enabled }}
      nodeSelector:
        {{- toYaml .Values.scheduleapi.nodeSelector.labels | nindent 8 }}
      {{- end }}
      restartPolicy: Always
      volumes:
        {{- include "workload.volumes" .Values.scheduleapi | indent 8 }}
   
