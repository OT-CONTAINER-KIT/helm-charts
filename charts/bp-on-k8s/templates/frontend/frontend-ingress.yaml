{{- if .Values.frontend.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.frontend.ingress.name }}
  labels: 
    app.kubernetes.io/name: {{ .Values.publicapi.service.name | default .Release.Name }}
  annotations:
    {{- range $key, $value := .Values.frontend.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.frontend.ingress.className }}
  rules:
  - host: {{ .Values.frontend.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.frontend.ingress.serviceName }}
            port:
              number: {{ .Values.frontend.ingress.servicePort }}
  {{- if .Values.frontend.ingress.tls }}
  tls:
  - hosts:
    - {{ .Values.frontend.ingress.host }}
    secretName: {{ .Values.frontend.ingress.tlsSecret }}
  {{- end }}
{{- end }}
