{{- $root := . -}}
{{- $tags := .Values.tags | default dict -}}
{{- range $svcKey := list "backend" "frontend" "consumer" }}
{{- $svc := index $root.Values $svcKey -}}
{{- if $svc }}
{{- $tagEnabled := true -}}
{{- if hasKey $tags $svcKey }}
{{- $tagEnabled = index $tags $svcKey -}}
{{- end }}
{{- if and ($svc.enabled | default false) $tagEnabled }}
{{- if $svc.internalIngress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $svc.name }}-internal-ing
  namespace: kubelift
  annotations:
    kubernetes.io/ingress.class: {{ $svc.internalIngress.class }}
{{- if $svc.internalIngress.annotations }}
  {{ toYaml $svc.internalIngress.annotations | nindent 2 }}
{{- end }}
  labels:
    {{- include "kubelift.labels" (dict "name" $svc.name "component" $svc.component) | nindent 4 }}
spec:
  ingressClassName: {{ $svc.internalIngress.class }}
  rules:
{{- range $rule := $svc.internalIngress.rules }}
    - host: {{ $rule.hostname }}
      http:
        paths:
        {{- if (kindIs "slice" $rule.path) }}
        {{- range $path := $rule.path }}
          - path: {{ $path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $svc.name }}
                port:
                  number: {{ $svc.service.port }}
        {{- end }}
        {{- end }}
        {{- if (kindIs "string" $rule.path) }}
          - path: {{ $rule.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $svc.name }}
                port:
                  number: {{ $svc.service.port }}
        {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
