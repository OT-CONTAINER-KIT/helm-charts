apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-registry
spec:
  replicas: 1
  selector:
    matchLabels: {component: registry}
  template:
    metadata:
      labels: {component: registry}
    spec:
      containers:
      - name: registry
        image: {{ .Values.images.registry }}
        env:
        - name: REGISTRY_STORAGE_S3_ACCESSKEY
          value: {{ .Values.s3.accesskey }}
        - name: REGISTRY_STORAGE_S3_SECRETKEY
          value: {{ .Values.s3.secretkey }}
        - name: REGISTRY_STORAGE_S3_REGION
          value: {{ .Values.s3.region }}
        - name: REGISTRY_STORAGE_S3_BUCKET
          value: {{ .Values.s3.bucket }}
        - name: REGISTRY_STORAGE_S3_ENDPOINT
          value: {{ .Values.s3.endpoint }}
        # --- Added Volume Mount ---
        volumeMounts:
        - name: registry-config
          mountPath: /etc/registry/config.yml
          subPath: config.yml
      # --- Added Volumes Block ---
      volumes:
      - name: registry-config
        configMap:
          name: harbor-registry-config

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: harbor-trivy
spec:
  serviceName: "trivy"
  replicas: 1
  selector:
    matchLabels: {component: trivy}
  template:
    metadata:
      labels: {component: trivy}
    spec:
      containers:
      - name: trivy
        image: {{ .Values.images.trivy }}
