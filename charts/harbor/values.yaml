fullnameOverride: "stateless-app-harbor"

harbor:
  internalURL: http://stateless-app-harbor-core.harbor.svc.cluster.local
  # Mandatory for encrypting DB secrets
  secretKey: "stateless-harbor-master-key-32ch" 
    
  core:
    replicas: 1
    secret: "opstree-harbor-shared-secret"
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "200Mi"
        cpu: "100m"
  
  jobservice:
    replicas: 1
    secret: "opstree-harbor-shared-secret"
    jobLoggers:
      - database
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "200Mi"
        cpu: "100m"

  registry:
    replicas: 1
    secret: "opstree-harbor-shared-secret"
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "200Mi"
        cpu: "100m"
        
  portal:
    replicas: 1
    resources:
      requests:
        memory: "32Mi"
        cpu: "20m"
      limits:
        memory: "64Mi"
        cpu: "50m"

  nginx:
    replicas: 1
    resources:
      requests:
        memory: "32Mi"
        cpu: "20m"
      limits:
        memory: "64Mi"
        cpu: "50m"

  # Trivy is heavy; we give it the remaining 'headroom' in the quota
  trivy:
    enabled: true
    replicas: 1
    resources:
      requests:
        memory: "200Mi"
        cpu: "100m"
      limits:
        memory: "300Mi"
        cpu: "500m"
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "longhorn" 

  oidc:
    enabled: true
    name: "Keycloak"
    endpoint: "https://keycloak.opstree.dev/auth/realms/master"
    clientId: "harbor"
    clientSecret: "6s18ll0o3wtF8X07XLvkt8ykpmj8TTLU"
    scope: "openid,profile,email,offline_access"
    verifyCert: true
    redirectUrl: "${HARBOR_EXTERNAL_URL}/c/oidc/callback"

  expose:
    type: clusterIP 
    tls:
      enabled: false 

  externalURL: ${HARBOR_EXTERNAL_URL}

  metrics:
    enabled: true
    exporter:
      port: 8001
      path: /metrics

  exporter:
    replicas: 1
    image:
      repository: goharbor/harbor-exporter
      tag: v2.10.0
    resources:
      requests:
        cpu: "20m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"

  database:
    type: external
    external:
      host: "${DB_HOST}"
      port: 5432
      username: "${DB_USER}"
      password: "${DB_PASSWORD}"
      coreDatabase: "${DB_NAME}"
      sslmode: "disable"

  redis:
    type: external
    external:
      addr: "${REDIS_ADDR}"
      password: "${REDIS_PASSWORD}"

  persistence:
    enabled: true
    jobservice:
      jobLog: false 
    imageChartStorage:
      type: s3
      s3:
        region: us-east-1
        bucket: "${S3_BUCKET}"
        accesskey: "${S3_ACCESS_KEY}"
        secretkey: "${S3_SECRET_KEY}"
        regionendpoint: "${S3_ENDPOINT}"
        secure: true
        v4auth: true
        skipverify: true

database:
  internal:
    enabled: false
redis:
  internal:
    enabled: false
postgresql:
  enabled: false
