fullnameOverride: "stateless-app-harbor"

harbor:
  # 1. Exposure Settings
  expose:
    type: nodePort  # Typically used when behind an Ingress or BuildPiper LB
    tls:
      enabled: false 
    # Use the block below if you explicitly need NodePort exposure
      nodePort:
        name: harbor
        ports:
          http:
            port: 80
            nodePort: 30003

  # 2. External Access URL
  externalURL: ${HARBOR_EXTERNAL_URL}

  # 3. External Database Configuration (PostgreSQL)
  database:
    type: external
    external:
      host: "${DB_HOST}"
      port: 5432
      username: "${DB_USER}"
      password: "${DB_PASSWORD}"
      coreDatabase: "${DB_NAME}"

  # 4. External Cache Configuration (Redis)
  redis:
    type: external
    external:
      addr: "${REDIS_ADDR}"
      password: "${REDIS_PASSWORD}"

  # 5. Storage Configuration (MinIO / S3)
  persistence:
    enabled: true
    # Disabling Jobservice PVC to utilize Database Logging (Stateless)
    jobservice:
      jobLog: false 
    imageChartStorage:
      type: s3
      s3:
        region: us-east-1
        bucket: "${S3_BUCKET}"
        accesskey: "${S3_ACCESS_KEY}"
        secretkey: "${S3_SECRET_KEY}"
        regionendpoint: "${S3_ENDPOINT}"
        secure: true
        v4auth: true
        skipverify: true

  # 6. Service Management & Replica Scaling
  jobservice:
    # Critical: Routes task logs to Postgres instead of Disk
    jobLoggers:
      - database
    replicas: ${JOBSERVICE_REPLICAS}

  core:
    replicas: ${CORE_REPLICAS}
    # Optional: ensure internal secret consistency to avoid 404s
    # secret: "${HARBOR_CORE_SECRET}"

  portal:
    replicas: ${PORTAL_REPLICAS}

  registry:
    replicas: ${REGISTRY_REPLICAS}
    # secret: "${HARBOR_REGISTRY_SECRET}"

  nginx:
    replicas: ${NGINX_REPLICAS}

  # 7. Security Scanner (Trivy)
  trivy:
    enabled: true
    replicas: ${TRIVY_REPLICAS}
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "longhorn" 

# 8. Global Disables for Internal Sub-Charts (ROOT Level)
database:
  internal:
    enabled: false
redis:
  internal:
    enabled: false
postgresql:
  enabled: false
