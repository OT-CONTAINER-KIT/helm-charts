fullnameOverride: "stateless-app-harbor"

harbor:
  expose:
    type: clusterIP
    tls:
      enabled: false

  externalURL: ${HARBOR_EXTERNAL_URL}

  database:
    type: external
    external:
      host: "${DB_HOST}"
      port: 5432
      username: "${DB_USER}"
      password: "${DB_PASSWORD}"
      coreDatabase: "${DB_NAME}"

  redis:
    type: external
    external:
      addr: "${REDIS_ADDR}"
      password: "${REDIS_PASSWORD}"

  persistence:
    enabled: true
    # Disabling Jobservice PVC because logs move to Postgres
    jobservice:
      jobLog: false 
    imageChartStorage:
      type: s3
      s3:
        region: us-east-1
        bucket: "${S3_BUCKET}"
        accesskey: "${S3_ACCESS_KEY}"
        secretkey: "${S3_SECRET_KEY}"
        regionendpoint: "${S3_ENDPOINT}"
        secure: true
        v4auth: true
        skipverify: true

  jobservice:
    # This setting tells Harbor to store task logs in the External Postgres
    jobLogger: database
    replicas: ${JOBSERVICE_REPLICAS}

  trivy:
    enabled: true
    replicas: ${TRIVY_REPLICAS}
    persistence:
      enabled: true
      # Keeping default PVC behavior as per your request
      size: 5Gi
      storageClass: "longhorn" 

  portal:
    replicas: ${PORTAL_REPLICAS}
  core:
    replicas: ${CORE_REPLICAS}
  registry:
    replicas: ${REGISTRY_REPLICAS}
  nginx:
    replicas: ${NGINX_REPLICAS}
