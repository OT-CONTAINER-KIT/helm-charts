# values.yaml
harbor:
  expose:
    type: clusterIP
    tls:
      enabled: false
#    ingress:
#      ingressClassName: nginx
#      hosts:
#        core: ${HARBOR_EXTERNAL_URL_HOST}
#      annotations:
#        kubernetes.io/ingress.class: nginx
#        nginx.ingress.kubernetes.io/proxy-body-size: "0"
#        nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
#        nginx.ingress.kubernetes.io/proxy-send-timeout: "900"

  # Variablized External URL
  externalURL: ${HARBOR_EXTERNAL_URL}

  database:
    type: external
    external:
      host: "${DB_HOST}"
      port: 5432
      username: "${DB_USER}"
      password: "${DB_PASSWORD}"
      coreDatabase: "${DB_NAME}"

  redis:
    type: external
    external:
      addr: "${REDIS_ADDR}"
      password: "${REDIS_PASSWORD}"

  persistence:
    enabled: true
    imageChartStorage:
      type: s3
      s3:
        region: us-east-1
        bucket: "${S3_BUCKET}"
        accesskey: "${S3_ACCESS_KEY}"
        secretkey: "${S3_SECRET_KEY}"
        regionendpoint: "${S3_ENDPOINT}"
        secure: true
        v4auth: true
        skipverify: true
        
  trivy:
    enabled: true
    replicas: ${TRIVY_REPLICAS}
  # Replicas variablized for scaling control in BuildPiper
  portal:
    replicas: ${PORTAL_REPLICAS}
  core:
    replicas: ${CORE_REPLICAS}
  jobservice:
    replicas: ${JOBSERVICE_REPLICAS}
  registry:
    replicas: ${REGISTRY_REPLICAS}
  nginx:
    replicas: ${NGINX_REPLICAS}
