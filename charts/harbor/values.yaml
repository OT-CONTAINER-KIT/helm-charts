fullnameOverride: "stateless-app-harbor"

harbor:
  # This key encrypts data in the DB. Never change it after the first install.
  secretKey: "stateless-harbor-master-key-32ch" 
    
  core:
    authMode: "oidc_auth" # Use oidc_auth to match the API requirement
    replicas: ${CORE_REPLICAS}
    # CHANGE: Use the SAME secret string for all three below
    secret: "opstree-shared-internal-secret" 
  
  oidc:
    name: "Keycloak"
    endpoint: "https://keycloak.opstree.dev/auth/realms/master"
    clientId: "harbor"
    clientSecret: "XR5IBgxZsF0GDqyVdGNSWXdjvRCc218D"
    scope: "openid,profile,email,offline_access"
    verifyCert: true
    redirectUrl: "https://harbor.opstree.dev/c/oidc/callback"
    
  jobservice:
    # If DNS continues to fail, replace this hostname with the ClusterIP
    core_url: "http://stateless-app-harbor-core:80"
    jobLoggers:
      - database
    replicas: ${JOBSERVICE_REPLICAS}
    # CHANGE: Must be identical to core.secret
    secret: "opstree-shared-internal-secret" 

  registry:
    replicas: ${REGISTRY_REPLICAS}
    # CHANGE: Must be identical to core.secret
    secret: "opstree-shared-internal-secret"

  # --- END OF NEW SECRET BLOCK ---

  expose:
    type: clusterIP
    tls:
      enabled: false 

  externalURL: ${HARBOR_EXTERNAL_URL}

  database:
    type: external
    external:
      host: "${DB_HOST}"
      port: 5432
      username: "${DB_USER}"
      password: "${DB_PASSWORD}"
      coreDatabase: "${DB_NAME}"

  redis:
    type: external
    external:
      addr: "${REDIS_ADDR}"
      password: "${REDIS_PASSWORD}"

  persistence:
    enabled: true
    jobservice:
      jobLog: false 
    imageChartStorage:
      type: s3
      s3:
        region: us-east-1
        bucket: "${S3_BUCKET}"
        accesskey: "${S3_ACCESS_KEY}"
        secretkey: "${S3_SECRET_KEY}"
        regionendpoint: "${S3_ENDPOINT}"
        secure: true
        v4auth: true
        skipverify: true

  portal:
    replicas: ${PORTAL_REPLICAS}

  nginx:
    replicas: ${NGINX_REPLICAS}

  trivy:
    enabled: true
    replicas: ${TRIVY_REPLICAS}
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "longhorn" 

# Global Disables
database:
  internal:
    enabled: false
redis:
  internal:
    enabled: false
postgresql:
  enabled: false
