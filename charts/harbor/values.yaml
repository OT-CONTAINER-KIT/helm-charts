fullnameOverride: "stateless-app-harbor"

harbor:
  # --- This parent 'harbor' key is MANDATORY ---
  secretKey: "stateless-harbor-master-key-32ch" 
    
  core:
    replicas: ${CORE_REPLICAS}
    secret: "opstree-harbor-shared-secret"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  jobservice:
    replicas: ${JOBSERVICE_REPLICAS}
    secret: "opstree-harbor-shared-secret"
    jobLoggers:
      - database
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  registry:
    replicas: ${REGISTRY_REPLICAS}
    secret: "opstree-harbor-shared-secret"
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
        
  portal:
    replicas: ${PORTAL_REPLICAS}
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"

  nginx:
    replicas: ${NGINX_REPLICAS}
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"

  trivy:
    enabled: true
    replicas: ${TRIVY_REPLICAS}
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "longhorn" 

  oidc:
    name: "Keycloak"
    endpoint: "https://keycloak.opstree.dev/auth/realms/master"
    clientId: "harbor"
    clientSecret: "XR5IBgxZsF0GDqyVdGNSWXdjvRCc218D"
    scope: "openid,profile,email,offline_access"
    verifyCert: true
    redirectUrl: "https://harbor.opstree.dev/c/oidc/callback"

  expose:
    type: clusterIP
    tls:
      enabled: false 

  externalURL: ${HARBOR_EXTERNAL_URL}

  database:
    type: external
    external:
      host: "${DB_HOST}"
      port: 5432
      username: "${DB_USER}"
      password: "${DB_PASSWORD}"
      coreDatabase: "${DB_NAME}"

  redis:
    type: external
    external:
      addr: "${REDIS_ADDR}"
      password: "${REDIS_PASSWORD}"

  persistence:
    enabled: true
    jobservice:
      jobLog: false 
    imageChartStorage:
      type: s3
      s3:
        region: us-east-1
        bucket: "${S3_BUCKET}"
        accesskey: "${S3_ACCESS_KEY}"
        secretkey: "${S3_SECRET_KEY}"
        regionendpoint: "${S3_ENDPOINT}"
        secure: true
        v4auth: true
        skipverify: true

# These are outside the harbor block because they are sub-charts
database:
  internal:
    enabled: false
redis:
  internal:
    enabled: false
postgresql:
  enabled: false
