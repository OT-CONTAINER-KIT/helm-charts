fullnameOverride: "stateless-app-harbor"

harbor:
  # --- NEW: SHARED SECRETS BLOCK ---
  # secretKey is used for encryption of sensitive data in the DB.
  # If you change this later, you won't be able to read existing passwords!
  secretKey: "stateless-harbor-master-key-32ch" 

  core:
    # Set Auth Mode to OIDC
    authMode: "oidc"
    
  # OIDC Settings
  oidc:
    name: "Keycloak"
    # Replace with your Keycloak Realm URL (e.g., https://keycloak.opstree.dev/auth/realms/master)
    endpoint: "https://keycloak.opstree.dev/auth/realms/master"
    # Matches 'Client ID' in your screenshot
    clientId: "harbor"
    # Copy the 'Client Secret' from your Credentials tab
    clientSecret: "XR5IBgxZsF0GDqyVdGNSWXdjvRCc218D"
    # Scopes required for OIDC
    scope: "openid,profile,email,offline_access"
    # Standard claim name for groups in Keycloak
    groupsClaim: "groups"
    # If using self-signed certs for Keycloak, set this to false
    verifyCert: true
    # This must match 'Valid redirect URIs' in Keycloak
    redirectUrl: "https://harbor.opstree.dev/c/oidc/callback"
    
    replicas: ${CORE_REPLICAS}
    # This fixed secret allows multiple core pods to sync and Jobservice to authenticate
    secret: "${HARBOR_CORE_SECRET}"

  jobservice:
    core_url: "http://stateless-app-harbor-core"
    jobLoggers:
      - database
    replicas: ${JOBSERVICE_REPLICAS}
    # Secret used for internal communication
    secret: "${HARBOR_JOBSERVICE_SECRET}"

  registry:
    replicas: ${REGISTRY_REPLICAS}
    # Secret used for communication between core and registry
    secret: "${HARBOR_REGISTRY_SECRET}"

  # --- END OF NEW SECRET BLOCK ---

  expose:
    type: clusterIP
    tls:
      enabled: false 

  externalURL: ${HARBOR_EXTERNAL_URL}

  database:
    type: external
    external:
      host: "${DB_HOST}"
      port: 5432
      username: "${DB_USER}"
      password: "${DB_PASSWORD}"
      coreDatabase: "${DB_NAME}"

  redis:
    type: external
    external:
      addr: "${REDIS_ADDR}"
      password: "${REDIS_PASSWORD}"

  persistence:
    enabled: true
    jobservice:
      jobLog: false 
    imageChartStorage:
      type: s3
      s3:
        region: us-east-1
        bucket: "${S3_BUCKET}"
        accesskey: "${S3_ACCESS_KEY}"
        secretkey: "${S3_SECRET_KEY}"
        regionendpoint: "${S3_ENDPOINT}"
        secure: true
        v4auth: true
        skipverify: true

  portal:
    replicas: ${PORTAL_REPLICAS}

  nginx:
    replicas: ${NGINX_REPLICAS}

  trivy:
    enabled: true
    replicas: ${TRIVY_REPLICAS}
    persistence:
      enabled: true
      size: 5Gi
      storageClass: "longhorn" 

# Global Disables
database:
  internal:
    enabled: false
redis:
  internal:
    enabled: false
postgresql:
  enabled: false
