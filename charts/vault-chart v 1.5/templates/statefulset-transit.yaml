apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vault.fullname" . }}-transit

spec:
  serviceName: {{ include "vault.fullname" . }}-transit-headless

  replicas: {{ .Values.transit.replicaCount }}

  selector:
    matchLabels:
      app: {{ include "vault.fullname" . }}-transit


  template:
    metadata:
      labels:
        app: {{ include "vault.fullname" . }}-transit


    spec:
      serviceAccountName: {{ include "vault.fullname" . }}-vault-sa

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: vault
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          command: ["vault", "server"]
          args:
            - "-config=/vault/config/vault.hcl"

          ports:
            - name: http
              containerPort: 8200
            - name: internal
              containerPort: 8201

          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5

          volumeMounts:
            - name: config
              mountPath: /vault/config
            - name: data
              mountPath: /vault/data

      volumes:
        - name: config
          configMap:
            name: {{ include "vault.fullname" . }}-transit-config


  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        {{- if (eq "-" .Values.persistence.storageClass) }}
        storageClassName: ""
        {{- else }}
        storageClassName: "{{ .Values.persistence.storageClass }}"
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}