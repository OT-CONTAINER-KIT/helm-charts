apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  annotations:
{{- with .Values.annotations }}
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  parentRefs:
{{- range .Values.parentRefs }}
  - name: {{ .name }}
    namespace: {{ .namespace }}
{{- end }}
  hostnames:
{{- range .Values.hostnames }}
  - "{{ . }}"
{{- end }}
  rules:
{{- range .Values.rules }}
  - matches:
{{- range .matches }}
    - path:
        type: {{ .type }}
        value: {{ .value | quote }}
{{- end }}
    backendRefs:
{{- range .backendRefs }}
    - name: {{ .name }}
      kind: {{ .kind }}
      port: {{ .port }}
{{- end }}
{{- end }}
