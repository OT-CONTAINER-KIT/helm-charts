---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "base.fullname" . }}
  namespace: kubelift
  labels:
    {{- include "kubelift.labels" . | nindent 4 }}
spec:
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount | default 1 }}
{{- end }}
  selector:
    matchLabels:
      {{- include "kubelift.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubelift.labels" . | nindent 8 }}
    spec:
      {{- if .Values.base.image.pullSecrets }}
      imagePullSecrets:
        - name: {{ .Values.base.image.pullSecrets }}
      {{- end }}
      terminationGracePeriodSeconds: 120
      containers:
        - name: {{ include "base.fullname" . }}
          image: "{{ .Values.base.image.repository }}:{{ .Values.base.image.tag }}"
          imagePullPolicy: {{ .Values.base.image.pullPolicy | default "IfNotPresent" }}

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          envFrom:
            - secretRef:
                name: {{ .Values.base.existingSecret }}

          {{- if .Values.healthcheck.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.statusPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
            successThreshold: 1
            timeoutSeconds: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.statusPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
            successThreshold: 1
            timeoutSeconds: 1
            failureThreshold: 3
          {{- end }}

          {{- if .Values.volumes }}
          volumeMounts:
            {{- if .Values.volumes.configMaps }}
            {{- range $conf := .Values.volumes.configMaps }}
            - mountPath: {{ $conf.mountPath }}
              name: {{ $conf.name }}-volume
            {{- end }}
            {{- end }}
          {{- end }}

      {{- if .Values.volumes }}
      volumes:
        {{- if .Values.volumes.configMaps }}
        {{- range $conf := .Values.volumes.configMaps }}
        - name: {{ $conf.name }}-volume
          configMap:
            name: {{ $conf.name }}
        {{- end }}
        {{- end }}
      {{- end }}
