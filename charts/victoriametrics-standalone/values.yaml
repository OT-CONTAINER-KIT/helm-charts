vm:
  enabled: true

  victoria-metrics-operator:
    enabled: true

    image:
      registry: quay.io
      repository: opstree/victoriametrics-operator
      tag: "v0.69.0"

    resources:
      limits:
        cpu: 200m
        memory: 500Mi
      requests:
        cpu: 50m
        memory: 300Mi

    tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        operator: Exists

    serviceMonitor:
      enabled: true

    operator:
      disable_prometheus_converter: false

    env:
      # opstree hardened images — repository only, operator appends version tag
      - name: VM_VMSINGLEDEFAULT_IMAGE
        value: "quay.io/opstree/victoriamertics-victoriametrics"
      - name: VM_VMAGENTDEFAULT_IMAGE
        value: "quay.io/opstree/victoriametrics-vmagent"
      - name: VM_VMALERTDEFAULT_IMAGE
        value: "quay.io/opstree/victoriametrics-vmalert"
      - name: VM_VMALERTMANAGER_ALERTMANAGERDEFAULTBASEIMAGE
        value: "quay.io/opstree/alertmanager"
      # upstream images — not yet hardened
      - name: VM_VLOGSDEFAULT_IMAGE
        value: "quay.io/victoriametrics/victoria-logs"
      - name: VM_VMCLUSTERDEFAULT_VMSELECTDEFAULT_IMAGE
        value: "quay.io/victoriametrics/vmselect"
      - name: VM_VMCLUSTERDEFAULT_VMSTORAGEDEFAULT_IMAGE
        value: "quay.io/victoriametrics/vmstorage"
      - name: VM_VMCLUSTERDEFAULT_VMINSERTDEFAULT_IMAGE
        value: "quay.io/victoriametrics/vminsert"
      - name: VM_VMBACKUP_IMAGE
        value: "quay.io/victoriametrics/vmbackupmanager"
      - name: VM_VMAUTHDEFAULT_IMAGE
        value: "quay.io/victoriametrics/vmauth"

  grafana:
    enabled: false

  alertmanager:
    enabled: true
    spec:
      replicaCount: 1
      resources:
        limits:
          cpu: 250m
          memory: 500Mi
        requests:
          cpu: 50m
          memory: 200Mi
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists

  vmsingle:
    enabled: true
    spec:
      retentionPeriod: "7d"
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
        requests:
          cpu: 200m
          memory: 512Mi
      storage:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
    
  vmagent:
    enabled: true
    spec:
      scrapeInterval: 30s
      resources:
        limits:
          cpu: 500m
          memory: 500Mi
        requests:
          cpu: 50m
          memory: 200Mi
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists

  vmalert:
    enabled: true
    spec:
      resources:
        limits:
          cpu: 500m
          memory: 500Mi
        requests:
          cpu: 50m
          memory: 200Mi
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists

  kube-state-metrics:
    image:
      registry: quay.io
      repository: opstree/kube-state-metrics
      tag: "2.18.0-debian13"
      digest: "sha256:53525d253793ccb33f525781831df4d66f25634b90318f07b5c41ae1e5bb587b"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi
    tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        operator: Exists

  prometheus-node-exporter:
    image:
      registry: quay.io
      repository: opstree/node-exporter
      tag: "1.11.1-alpine3.23"
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
      requests:
        cpu: 10m
        memory: 32Mi
    tolerations:
      - effect: NoExecute
        operator: Exists
      - effect: NoSchedule
        operator: Exists

  defaultDashboards:
    enabled: false

  defaultRules:
    create: false

  vmcluster:
    enabled: false

prometheus-operator-crds:
  enabled: true
