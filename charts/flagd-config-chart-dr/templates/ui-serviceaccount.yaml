{{- if and .Values.ui.enabled .Values.ui.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flagd-config-chart-dr.uiServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flagd-config-chart-dr.uiLabels" . | nindent 4 }}
  {{- with .Values.ui.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
