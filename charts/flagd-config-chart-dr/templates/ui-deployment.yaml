{{- if .Values.ui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flagd-config-chart-dr.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flagd-config-chart-dr.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "flagd-config-chart-dr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/ui-configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "flagd-config-chart-dr.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flagd-config-chart-dr.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: ui
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Installing dependencies..."
              export PYTHONPATH=$PYTHONPATH:/tmp/lib/python3.11/site-packages
              pip install --no-cache-dir --target /tmp/lib/python3.11/site-packages flask kubernetes
              echo "Starting Flagd Manager..."
              python /app/app.py
          env:
            - name: NAMESPACE
              value: {{ .Release.Namespace }}
            - name: PYTHONPATH
              value: /tmp/lib/python3.11/site-packages
            - name: HOME
              value: /tmp
            {{- if .Values.ui.auth.enabled }}
            - name: UI_USERNAME
              value: {{ .Values.ui.auth.username | quote }}
            - name: UI_PASSWORD
              value: {{ .Values.ui.auth.password | quote }}
            - name: FLASK_SECRET_KEY
              value: {{ .Values.ui.auth.secretKey | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: ui-code
              mountPath: /app
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ui-code
          configMap:
            name: {{ include "flagd-config-chart-dr.fullname" . }}-ui-code
        - name: tmp
          emptyDir: {}
{{- end }}
