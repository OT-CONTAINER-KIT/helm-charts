    controller-gen.kubebuilder.io/version: v0.16.5
  name: featureflags.core.openfeature.dev
spec:
  group: core.openfeature.dev
  names:
    kind: FeatureFlag
    listKind: FeatureFlagList
    plural: featureflags
    shortNames:
    - ff
    singular: featureflag
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: FeatureFlag is the Schema for the featureflags API
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: FeatureFlagSpec defines the desired state of FeatureFlag
            properties:
              flagSpec:
                properties:
                  $evaluators:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  flags:
                    additionalProperties:
                      properties:
                        defaultVariant:
                          type: string
                        metadata:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        state:
                          enum:
                          - ENABLED
                          - DISABLED
                          type: string
                        targeting:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        variants:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                      required:
                      - defaultVariant
                      - state
                      - variants
                      type: object
                    type: object
                  metadata:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                required:
                - flags
                type: object
            type: object
          status:
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

