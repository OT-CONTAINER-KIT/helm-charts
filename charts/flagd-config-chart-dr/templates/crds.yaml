        openAPIV3Schema:
          description: FlagdConfig is the Schema for the flagdconfigs API
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: FlagdConfigSpec defines the desired state of FlagdConfig
              properties:
                metricCollectionTargetPort:
                  format: int32
                  default: 8013
                  type: integer
                flagdProxyConfiguration:
                  properties:
                    port:
                      format: int32
                      default: 8015
                      type: integer
                    managementPort:
                      format: int32
                      default: 8016
                      type: integer
                    image:
                      type: string
                    tag:
                      type: string
                    debugLogging:
                      type: boolean
                      default: false
                  type: object
                flagdSidecarConfiguration:
                  properties:
                    port:
                      format: int32
                      default: 8013
                      type: integer
                    managementPort:
                      format: int32
                      default: 8014
                      type: integer
                    image:
                      type: string
                    tag:
                      type: string
                    pullPolicy:
                      type: string
                      enum:
                        - Always
                        - Never
                        - IfNotPresent
                    debugLogging:
                      type: boolean
                      default: false
                  type: object
              type: object
            status:
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}

