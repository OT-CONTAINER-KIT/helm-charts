apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flagd-config-chart-dr.fullname" . }}-ui-code
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flagd-config-chart-dr.labels" . | nindent 4 }}
data:
  app.py: |
    import os
    import json
    from flask import Flask, render_template_string, request, jsonify, session, redirect, url_for
    from kubernetes import client, config
    from functools import wraps

    app = Flask(__name__)
    app.secret_key = os.getenv("FLASK_SECRET_KEY", "flagd-manager-awesome-secret")

    # Load Kubernetes configuration
    try:
        config.load_incluster_config()
    except:
        config.load_kube_config()

    custom_api = client.CustomObjectsApi()
    core_api = client.CoreV1Api()
    
    # Configuration
    GROUP = "core.openfeature.dev"
    VERSION = "v1beta1"
    PLURAL_FLAGS = "featureflags"
    PLURAL_SOURCES = "featureflagsources"
    DEFAULT_NAMESPACE = os.getenv("NAMESPACE", "flagd-nonprod")
    
    # Auth Configuration
    UI_USER = os.getenv("UI_USERNAME", "admin")
    UI_PASS = os.getenv("UI_PASSWORD", "admin")

    # Auth Decorator
    def login_required(f):
        @wraps(f)
        def decorated_function(*args, **kwargs):
            if not session.get("logged_in"):
                return redirect(url_for('login'))
            return f(*args, **kwargs)
        return decorated_function

    LOGIN_HTML = """
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Flagd Central</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --accent-color: #38bdf8;
                --text-primary: #f8fafc;
                --text-secondary: #94a3b8;
                --border: rgba(255, 255, 255, 0.1);
            }
            body { 
                font-family: 'Inter', sans-serif; background-color: var(--bg-color); 
                color: var(--text-primary); display: flex; align-items: center; 
                justify-content: center; height: 100vh; margin: 0;
            }
            .login-card {
                background: var(--card-bg); padding: 40px; border-radius: 24px;
                border: 1px solid var(--border); width: 100%; max-width: 400px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
            h1 { font-size: 28px; margin-bottom: 30px; color: var(--accent-color); text-align: center; }
            input {
                width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155;
                color: white; border-radius: 12px; box-sizing: border-box; margin-bottom: 20px;
                font-family: inherit; font-size: 16px;
            }
            .btn-login {
                width: 100%; padding: 14px; background: var(--accent-color); color: #000;
                border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
                font-size: 16px; transition: 0.2s;
            }
            .btn-login:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4); }
            .error { color: #ef4444; text-align: center; margin-bottom: 20px; font-size: 14px; }
        </style>
    </head>
    <body>
        <div class="login-card">
            <h1>Flagd Central</h1>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required autofocus>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-login">Unlock Manager</button>
            </form>
            <p style="text-align: center; color: var(--text-secondary); font-size: 12px; margin-top: 20px;">
                Secure access for coe-dev-cluster
            </p>
        </div>
    </body>
    </html>
    """

    HTML_TEMPLATE = """
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flagd Central Manager</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --accent-color: #38bdf8;
                --text-primary: #f8fafc;
                --text-secondary: #94a3b8;
                --success: #22c55e;
                --danger: #ef4444;
                --border: rgba(255, 255, 255, 0.1);
            }

            body {
                font-family: 'Inter', sans-serif;
                background-color: var(--bg-color);
                color: var(--text-primary);
                margin: 0; padding: 20px; line-height: 1.5;
            }

            .container { max-width: 1200px; margin: 0 auto; }

            header {
                display: flex; justify-content: space-between; align-items: center;
                margin-bottom: 20px; padding: 25px;
                background: rgba(30, 41, 59, 0.8);
                backdrop-filter: blur(12px);
                border-radius: 20px; border: 1px solid var(--border);
            }

            .header-left { display: flex; align-items: center; gap: 30px; }
            h1 { margin: 0; font-size: 24px; color: var(--accent-color); letter-spacing: -0.025em; }

            .ns-selector {
                background: #0f172a; border: 1px solid #334155; color: white;
                padding: 10px 15px; border-radius: 10px; font-weight: 500;
                cursor: pointer; outline: none;
            }

            .tabs { display: flex; gap: 4px; margin-bottom: 25px; background: rgba(30, 41, 59, 0.4); padding: 5px; border-radius: 12px; width: fit-content; }
            .tab {
                padding: 10px 24px; cursor: pointer; color: var(--text-secondary);
                font-weight: 600; border-radius: 8px; transition: 0.2s;
            }
            .tab.active { background: var(--accent-color); color: #000; }

            .btn {
                padding: 12px 24px; border-radius: 10px; border: none;
                cursor: pointer; font-weight: 600; transition: 0.2s;
                display: inline-flex; align-items: center; gap: 8px;
            }
            .btn-primary { background: var(--accent-color); color: #000; }
            .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }

            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
            .card {
                background: var(--card-bg); border-radius: 16px; padding: 24px;
                border: 1px solid var(--border); transition: 0.3s;
                display: flex; flex-direction: column; gap: 15px;
            }
            .card:hover { border-color: var(--accent-color); transform: translateY(-2px); }

            .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
            .card-title h3 { margin: 0; font-size: 19px; }
            .card-title p { margin: 4px 0 0 0; color: var(--text-secondary); font-size: 13px; font-family: monospace; }
            
            .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
            .badge-source { background: rgba(56, 189, 248, 0.1); color: var(--accent-color); }

            .actions { display: flex; gap: 10px; margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); }
            .btn-sm { padding: 8px 16px; font-size: 13px; }
            .btn-edit { background: #334155; color: white; }
            .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
            .btn-logout { font-size: 13px; color: var(--text-secondary); background: transparent; border: 1px solid #334155; }

            #modal {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px);
                justify-content: center; align-items: center; z-index: 2000;
            }
            .modal-content {
                background: var(--card-bg); width: 95%; max-width: 800px;
                padding: 35px; border-radius: 24px; border: 1px solid var(--border);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
            textarea {
                width: 100%; height: 400px;
                background: #020617; color: #10b981; font-family: 'JetBrains Mono', 'Fira Code', monospace;
                padding: 20px; border-radius: 12px; border: 1px solid #334155;
                margin: 20px 0; box-sizing: border-box; font-size: 13px; line-height: 1.6;
            }
            .form-group { margin-bottom: 20px; }
            label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: var(--text-secondary); }
            input {
                width: 100%; padding: 14px; background: #0f172a;
                border: 1px solid #334155; color: white; border-radius: 10px;
                box-sizing: border-box; transition: 0.2s;
            }
            input:focus { border-color: var(--accent-color); outline: none; }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <div class="header-left">
                    <h1>Flagd Central</h1>
                    <select class="ns-selector" id="namespace-selector" onchange="updateNamespace(this.value)">
                        <option value="all">All Namespaces</option>
                    </select>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <button class="btn btn-logout" onclick="location.href='/logout'">Logout</button>
                    <div id="action-btn-container"></div>
                </div>
            </header>

            <div class="tabs">
                <div class="tab active" id="tab-flags" onclick="switchTab('flags')">Feature Flags</div>
                <div class="tab" id="tab-sources" onclick="switchTab('sources')">Flag Sources</div>
            </div>

            <div id="list-container" class="grid">
                <p style="text-align: center; grid-column: 1/-1; color: var(--text-secondary);">Initializing management interface...</p>
            </div>
        </div>

        <div id="modal">
            <div class="modal-content">
                <h2 id="modal-title" style="margin: 0 0 25px 0;">Create Resource</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Target Namespace</label>
                        <select class="ns-selector" style="width: 100%" id="modal-namespace"></select>
                    </div>
                    <div class="form-group">
                        <label>Resource Name</label>
                        <input type="text" id="item-name" placeholder="e.g. app-features-vault">
                    </div>
                </div>
                <label>Configuration Specification (JSON)</label>
                <textarea id="item-json" spellcheck="false"></textarea>
                <div style="display: flex; gap: 15px;">
                    <button class="btn btn-primary" style="flex: 2" onclick="saveItem()">Apply Configuration</button>
                    <button class="btn btn-edit" style="flex: 1" onclick="closeModal()">Discard Changes</button>
                </div>
            </div>
        </div>

        <script>
            let currentTab = 'flags';
            let activeNamespace = 'all';
            let namespaces = [];

            const TEMPLATES = {
                flags: {
                    flagSpec: {
                        flags: {
                            "new-feature-toggle": {
                                state: "ENABLED",
                                variants: { on: true, off: false },
                                defaultVariant: "on"
                            }
                        }
                    }
                },
                sources: {
                    sources: [
                        {
                            source: "https://vault.opstree.dev/v1/secret/data/feature-flags",
                            provider: "http",
                            interval: 30
                        }
                    ],
                    envVars: [
                      {
                        name: "HTTP_SYNC_BEARER_TOKEN",
                        valueFrom: {
                          secretKeyRef: {
                            name: "vault-token-secret",
                            key: "token"
                          }
                        }
                      }
                    ]
                }
            };

            async function init() {
                const nsResp = await fetch('/api/namespaces');
                if (nsResp.status === 401) return location.href = '/login';
                namespaces = await nsResp.json();
                
                const selectors = [document.getElementById('namespace-selector'), document.getElementById('modal-namespace')];
                selectors.forEach(sel => {
                    namespaces.forEach(ns => {
                        const opt = document.createElement('option');
                        opt.value = ns; opt.text = ns;
                        if (ns === '{{ "{{" }} default_ns {{ "}}" }}') opt.selected = true;
                        sel.appendChild(opt);
                    });
                });
                
                activeNamespace = document.getElementById('namespace-selector').value;
                switchTab('flags');
            }

            function updateNamespace(val) {
                activeNamespace = val;
                fetchItems();
            }

            function switchTab(tab) {
                currentTab = tab;
                document.getElementById('tab-flags').className = tab === 'flags' ? 'tab active' : 'tab';
                document.getElementById('tab-sources').className = tab === 'sources' ? 'tab active' : 'tab';
                
                const btnContainer = document.getElementById('action-btn-container');
                btnContainer.innerHTML = `<button class="btn btn-primary" onclick="openModal()">+ Add New ${tab === 'flags' ? 'Flag' : 'Source'}</button>`;
                
                fetchItems();
            }

            async function fetchItems() {
                const endpoint = (currentTab === 'flags' ? '/api/flags' : '/api/sources') + '?ns=' + activeNamespace;
                const resp = await fetch(endpoint);
                if (resp.status === 401) return location.href = '/login';
                const data = await resp.json();
                const list = document.getElementById('list-container');
                list.innerHTML = '';

                if (data.length === 0) {
                    list.innerHTML = `<div style="text-align: center; grid-column: 1/-1; padding: 60px; color: var(--text-secondary);">
                        No ${currentTab} configurations found in filter "${activeNamespace}"
                    </div>`;
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-title">
                                <h3>${item.metadata.name}</h3>
                                <p>ns/${item.metadata.namespace}</p>
                            </div>
                            <span class="badge ${currentTab === 'flags' ? 'badge-success' : 'badge-source'}">
                                ${currentTab === 'flags' ? 'FeatureFlag' : 'Source'}
                            </span>
                        </div>
                        <div class="actions">
                            <button class="btn btn-sm btn-edit" onclick="editItem('${item.metadata.namespace}', '${item.metadata.name}')">Configure</button>
                            <button class="btn btn-sm btn-delete" onclick="deleteItem('${item.metadata.namespace}', '${item.metadata.name}')">Remove</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            }

            function openModal(ns = '', name = '', json = null) {
                document.getElementById('modal').style.display = 'flex';
                document.getElementById('modal-namespace').value = ns || (activeNamespace === 'all' ? '{{ "{{" }} default_ns {{ "}}" }}' : activeNamespace);
                document.getElementById('modal-namespace').disabled = !!name;
                document.getElementById('item-name').value = name;
                document.getElementById('item-name').disabled = !!name;
                document.getElementById('modal-title').innerText = name ? `Update ${currentTab}` : `New Centralized ${currentTab}`;
                
                if (json) {
                    document.getElementById('item-json').value = JSON.stringify(json, null, 2);
                } else {
                    document.getElementById('item-json').value = JSON.stringify(TEMPLATES[currentTab], null, 2);
                }
            }

            function closeModal() { document.getElementById('modal').style.display = 'none'; }

            async function saveItem() {
                const ns = document.getElementById('modal-namespace').value;
                const name = document.getElementById('item-name').value;
                const specInput = document.getElementById('item-json').value;
                
                try {
                    const spec = JSON.parse(specInput);
                    const endpoint = currentTab === 'flags' ? '/api/flags' : '/api/sources';
                    
                    const resp = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ns, name, spec })
                    });

                    if (resp.ok) { closeModal(); fetchItems(); } 
                    else { alert('Deployment Failed: Access Denied or Invalid Configuration'); }
                } catch(e) { alert('Invalid JSON Syntax in Specification'); }
            }

            async function editItem(ns, name) {
                const endpoint = (currentTab === 'flags' ? '/api/flags/' : '/api/sources/') + name + '?ns=' + ns;
                const resp = await fetch(endpoint);
                const item = await resp.json();
                openModal(ns, name, item.spec);
            }

            async function deleteItem(ns, name) {
                if (!confirm(`Permanently remove ${name} from ${ns}?`)) return;
                const endpoint = (currentTab === 'flags' ? '/api/flags/' : '/api/sources/') + name + '?ns=' + ns;
                const resp = await fetch(endpoint, { method: 'DELETE' });
                if (resp.ok) fetchItems();
            }

            init();
        </script>
    </body>
    </html>
    """

    @app.route('/login', methods=['GET', 'POST'])
    def login():
        if request.method == 'POST':
            if request.form['username'] == UI_USER and request.form['password'] == UI_PASS:
                session['logged_in'] = True
                return redirect(url_for('index'))
            return render_template_string(LOGIN_HTML, error="Invalid credentials")
        return render_template_string(LOGIN_HTML)

    @app.route('/logout')
    def logout():
        session.pop('logged_in', None)
        return redirect(url_for('login'))

    @app.route('/')
    @login_required
    def index():
        return render_template_string(HTML_TEMPLATE, default_ns=DEFAULT_NAMESPACE)

    @app.route('/api/namespaces')
    @login_required
    def get_namespaces():
        try:
            nss = core_api.list_namespace()
            return jsonify([ns.metadata.name for ns in nss.items])
        except:
            return jsonify([DEFAULT_NAMESPACE])

    def handle_request(plural, name=None):
        ns = request.args.get('ns', DEFAULT_NAMESPACE)
        if request.method == 'GET':
            if name:
                return jsonify(custom_api.get_namespaced_custom_object(GROUP, VERSION, ns, plural, name))
            if ns == 'all':
                items = custom_api.list_cluster_custom_object(GROUP, VERSION, plural)
            else:
                items = custom_api.list_namespaced_custom_object(GROUP, VERSION, ns, plural)
            return jsonify(items.get("items", []))
        
        if request.method == 'POST':
            data = request.json
            target_ns = data.get("ns")
            name = data.get("name")
            spec = data.get("spec")
            kind = "FeatureFlag" if plural == PLURAL_FLAGS else "FeatureFlagSource"
            body = {
                "apiVersion": f"{GROUP}/{VERSION}",
                "kind": kind,
                "metadata": {"name": name, "namespace": target_ns},
                "spec": spec
            }
            try:
                custom_api.get_namespaced_custom_object(GROUP, VERSION, target_ns, plural, name)
                return jsonify(custom_api.patch_namespaced_custom_object(GROUP, VERSION, target_ns, plural, name, body))
            except:
                return jsonify(custom_api.create_namespaced_custom_object(GROUP, VERSION, target_ns, plural, body))

        if request.method == 'DELETE':
            return jsonify(custom_api.delete_namespaced_custom_object(GROUP, VERSION, ns, plural, name))

    @app.route('/api/flags', methods=['GET', 'POST'])
    @app.route('/api/flags/<name>', methods=['GET', 'DELETE'])
    @login_required
    def flags(name=None):
        try: return handle_request(PLURAL_FLAGS, name)
        except Exception as e: return jsonify({"error": str(e)}), 500

    @app.route('/api/sources', methods=['GET', 'POST'])
    @app.route('/api/sources/<name>', methods=['GET', 'DELETE'])
    @login_required
    def sources(name=None):
        try: return handle_request(PLURAL_SOURCES, name)
        except Exception as e: return jsonify({"error": str(e)}), 500

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)
