{{- if .Values.tls.enabled -}}
{{- $ca := genCA "flagd-config-chart-dr-ca" 3650 -}}
{{- $cert := genSignedCert (include "flagd-config-chart-dr.fullname" .) nil (list (printf "%s.%s.svc" (include "flagd-config-chart-dr.fullname" .) .Release.Namespace) (printf "%s.%s.svc.cluster.local" (include "flagd-config-chart-dr.fullname" .) .Release.Namespace)) 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flagd-config-chart-dr.fullname" . }}-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flagd-config-chart-dr.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
